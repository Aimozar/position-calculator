<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加密货币仓位计算器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; color: #00d4ff; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #aaa; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 8px; background: #16213e; color: #fff; font-size: 16px; }
        input:focus, select:focus { outline: none; border-color: #00d4ff; }
        .row { display: flex; gap: 10px; }
        .row .form-group { flex: 1; }
        .direction-group { display: flex; gap: 10px; }
        .direction-group label { flex: 1; text-align: center; padding: 15px; border: 2px solid #333; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .direction-group input { display: none; }
        .direction-group input:checked + span { font-weight: bold; }
        .direction-group label:has(input:checked) { border-color: #00d4ff; background: #1f3a5f; }
        .direction-long label:first-child { border-color: #00ff88; }
        .direction-long label:has(input:checked) { background: linear-gradient(135deg, #00ff88, #00cc6a); color: #000; }
        .direction-short label:last-child { border-color: #ff4757; }
        .direction-short label:has(input:checked) { background: linear-gradient(135deg, #ff4757, #cc3945); color: #fff; }
        button { width: 100%; padding: 15px; background: linear-gradient(135deg, #00d4ff, #0099cc); border: none; border-radius: 8px; color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background: linear-gradient(135deg, #00e5ff, #00aadd); }
        .result { margin-top: 25px; background: #16213e; border-radius: 12px; padding: 20px; display: none; }
        .result.show { display: block; }
        .direction { font-size: 24px; font-weight: bold; margin-bottom: 15px; padding: 10px; border-radius: 8px; text-align: center; }
        .direction.long { background: linear-gradient(135deg, #00ff88, #00cc6a); color: #000; }
        .direction.short { background: linear-gradient(135deg, #ff4757, #cc3945); color: #fff; }
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #333; }
        .exchange-tag { background: #333; padding: 5px 12px; border-radius: 15px; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 10px 5px; border-bottom: 1px solid #2a2a4a; }
        td:first-child { color: #aaa; }
        td:last-child { text-align: right; font-weight: bold; }
        .highlight { color: #00d4ff; font-size: 18px; }
        .warning { margin-top: 15px; padding: 12px; background: #2a1f1f; border-left: 4px solid #ff4757; border-radius: 4px; }
        .warning-item { color: #ff6b7a; font-size: 14px; margin-bottom: 5px; }
        .success { margin-top: 15px; padding: 12px; background: #1f2a20; border-left: 4px solid #00ff88; border-radius: 4px; color: #00ff88; }
        .fee-discount { margin-top: 20px; padding: 15px; background: #1f2a3a; border-radius: 8px; }
        .fee-discount h3 { color: #ffd700; margin-bottom: 10px; font-size: 16px; }
        .fee-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .fee-row .label { color: #aaa; }
        .fee-row .value { color: #00ff88; }
        .discount-links { margin-top: 15px; padding-top: 10px; border-top: 1px solid #333; font-size: 12px; color: #888; }
        .discount-links a { color: #00d4ff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 仓位计算器</h1>

        <div class="form-group">
            <label>交易所</label>
            <select id="exchange">
                <option value="Binance">Binance（币安）</option>
                <option value="OKX">OKX（欧易）</option>
                <option value="Bitget">Bitget</option>
                <option value="Bybit">Bybit</option>
                <option value="Hyperliquid">Hyperliquid</option>
            </select>
        </div>

        <div class="form-group">
            <label>交易方向（请务必点击选择）</label>
            <div class="direction-group direction-short">
                <label>
                    <input type="radio" name="direction" value="long">
                    <span>▲ 做多</span>
                </label>
                <label>
                    <input type="radio" name="direction" value="short" checked>
                    <span>▼ 做空</span>
                </label>
            </div>
        </div>

        <div class="form-group">
            <label>币种</label>
            <input type="text" id="symbol" value="BTC">
        </div>

        <div class="row">
            <div class="form-group">
                <label>账户总额 (USDT)</label>
                <input type="number" id="balance" value="5000">
            </div>
            <div class="form-group">
                <label>杠杆倍数</label>
                <input type="number" id="leverage" value="5">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>开仓价格</label>
                <input type="number" id="entryPrice" value="67000">
            </div>
            <div class="form-group">
                <label>止损价格</label>
                <input type="number" id="stopLoss" value="67200">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>止盈价格</label>
                <input type="number" id="takeProfit" value="62300">
            </div>
            <div class="form-group">
                <label>止损比例 (%)</label>
                <input type="number" id="riskPercent" value="1">
            </div>
        </div>

        <button onclick="calculate()">计算仓位</button>

        <div class="result" id="result">
            <div class="direction" id="directionTag"></div>

            <div class="result-header">
                <span id="symbolDisplay"></span>
                <span class="exchange-tag" id="exchangeDisplay"></span>
            </div>

            <table>
                <tr><td>账户总额</td><td id="rBalance"></td></tr>
                <tr><td>止损后亏本金的</td><td id="rRiskPercent"></td></tr>
                <tr><td>开仓价格</td><td id="rEntry"></td></tr>
                <tr><td>止损价格</td><td id="rStopLoss"></td></tr>
                <tr><td>止盈价格</td><td id="rTakeProfit"></td></tr>
                <tr><td>止损距离</td><td id="rStopDistance"></td></tr>
                <tr><td>止盈距离</td><td id="rTpDistance"></td></tr>
                <tr><td>手续费（双边）</td><td id="rFee"></td></tr>
                <tr><td>实际止损成本</td><td id="rRealStopCost"></td></tr>
                <tr><td>杠杆倍数</td><td id="rLeverage"></td></tr>
                <tr><td><strong>名义仓位</strong></td><td class="highlight" id="rNominal"></td></tr>
                <tr><td><strong>保证金</strong></td><td class="highlight" id="rMargin"></td></tr>
                <tr><td><strong>可买入数量</strong></td><td class="highlight" id="rQuantity"></td></tr>
                <tr><td>预期盈利</td><td id="rProfit"></td></tr>
                <tr><td><strong>盈亏比</strong></td><td class="highlight" id="rRiskReward"></td></tr>
                <tr><td>保证金占比</td><td id="rMarginRatio"></td></tr>
            </table>

            <div id="riskWarnings"></div>

            <div class="fee-discount" id="feeDiscount">
                <h3>💰 手续费优惠提示</h3>
                <div class="fee-row">
                    <span class="label">当前手续费</span>
                    <span id="fdCurrentFee"></span>
                </div>
                <div class="fee-row">
                    <span class="label">优惠后手续费</span>
                    <span class="value" id="fdDiscountFee"></span>
                </div>
                <div class="fee-row">
                    <span class="label">可节省</span>
                    <span class="value" id="fdSave"></span>
                </div>
                <div class="fee-row">
                    <span class="label">仓位可增加</span>
                    <span class="value" id="fdExtraPosition"></span>
                </div>
                <div class="fee-row">
                    <span class="label">盈亏比提升</span>
                    <span class="value" id="fdRiskReward"></span>
                </div>
                <div class="discount-links">
                    <p>Binance: <a href="https://bit.ly/35BACK" target="_blank">注册</a> 邀请码 35BACK (20%减免)</p>
                    <p>Bitget: <a href="https://partner.bitget.com/bg/ln6xlnxg" target="_blank">注册</a> 邀请码 cpvs9642 (50%减免)</p>
                    <p>OKX: <a href="https://www.okx.com/cn/join/71990708" target="_blank">注册</a> 邀请码 71990708 (20%减免)</p>
                    <p>Bybit: <a href="https://partner.bybit.com/b/40cat" target="_blank">注册</a> 邀请码 40cat (40%减免)</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const feeRates = {
            Binance: { spot: 0.00100, futures: 0.00050 },
            OKX: { spot: 0.00100, futures: 0.00050 },
            Bitget: { spot: 0.00100, futures: 0.00060 },
            Bybit: { spot: 0.00100, futures: 0.00055 },
            Hyperliquid: { spot: 0.00070, futures: 0.00045 }
        };

        const discountRates = {
            Binance: { spot: 0.00080, futures: 0.00040, discount: 0.20 },
            OKX: { spot: 0.00080, futures: 0.00040, discount: 0.20 },
            Bitget: { spot: 0.00050, futures: 0.00030, discount: 0.50 },
            Bybit: { spot: 0.00060, futures: 0.00033, discount: 0.40 }
        };

        function formatNumber(num, decimals) {
            if (isNaN(num)) return '0';
            return num.toFixed(decimals);
        }

        function getQuantityPrecision(symbol) {
            const upper = symbol.toUpperCase();
            if (upper.includes('BTC')) return 4;
            if (upper.includes('ETH')) return 3;
            return 2;
        }

        function calculate() {
            const exchange = document.getElementById('exchange').value;
            const directionEl = document.querySelector('input[name="direction"]:checked');
            const direction = directionEl ? directionEl.value : 'short';
            const symbol = document.getElementById('symbol').value || 'BTC';
            const balance = parseFloat(document.getElementById('balance').value);
            const leverage = parseFloat(document.getElementById('leverage').value) || 1;
            const entryPrice = parseFloat(document.getElementById('entryPrice').value);
            const stopLoss = parseFloat(document.getElementById('stopLoss').value);
            const takeProfit = parseFloat(document.getElementById('takeProfit').value);
            const riskPercent = parseFloat(document.getElementById('riskPercent').value) || 1;

            
            if (!balance || !entryPrice || !stopLoss || !takeProfit) {
                alert('请填写所有价格和金额');
                return;
            }

            // 使用用户选择的方向
            const actualDirection = direction;

            // 判断现货还是合约
            const isSpot = leverage === 1;
            const feeRate = isSpot ? feeRates[exchange].spot : feeRates[exchange].futures;

            // 计算止损距离
            let stopDistance;
            if (actualDirection === 'long') {
                stopDistance = (entryPrice - stopLoss) / entryPrice;
            } else {
                stopDistance = (stopLoss - entryPrice) / entryPrice;
            }

            // 最大亏损金额
            const maxLoss = balance * (riskPercent / 100);

            // 手续费修正
            const feeCost = feeRate * 2;
            const realStopCost = stopDistance + feeCost;

            // 名义仓位
            const nominalPosition = maxLoss / realStopCost;

            // 保证金
            const margin = nominalPosition / leverage;

            // 数量
            const quantity = nominalPosition / entryPrice;

            // 止盈距离
            let tpDistance;
            if (actualDirection === 'long') {
                tpDistance = (takeProfit - entryPrice) / entryPrice;
            } else {
                tpDistance = (entryPrice - takeProfit) / entryPrice;
            }

            // 预期盈利
            const expectedProfit = nominalPosition * tpDistance - nominalPosition * feeRate * 2;

            // 盈亏比
            const riskReward = expectedProfit / maxLoss;

            // 保证金占比
            const marginRatio = (margin / balance) * 100;

            // 显示结果
            const resultDiv = document.getElementById('result');
            resultDiv.classList.add('show');

            // 方向标签
            const dirTag = document.getElementById('directionTag');
            dirTag.textContent = actualDirection === 'long' ? '▲ 做多' : '▼ 做空';
            dirTag.className = 'direction ' + actualDirection;

            document.getElementById('symbolDisplay').textContent = symbol.toUpperCase();
            document.getElementById('exchangeDisplay').textContent = exchange + '（' + (isSpot ? '现货' : '合约') + ' Taker ' + feeRate + '%）';

            document.getElementById('rBalance').textContent = formatNumber(balance, 2) + ' USDT';
            document.getElementById('rRiskPercent').textContent = riskPercent + '%（最多亏 ' + formatNumber(maxLoss, 2) + ' USDT）';
            document.getElementById('rEntry').textContent = formatNumber(entryPrice, 2);
            document.getElementById('rStopLoss').textContent = formatNumber(stopLoss, 2);
            document.getElementById('rTakeProfit').textContent = formatNumber(takeProfit, 2);
            document.getElementById('rStopDistance').textContent = formatNumber(stopDistance * 100, 4) + '%';
            document.getElementById('rTpDistance').textContent = formatNumber(tpDistance * 100, 4) + '%';
            document.getElementById('rFee').textContent = formatNumber(feeCost, 4) + '%';
            document.getElementById('rRealStopCost').textContent = formatNumber(realStopCost * 100, 4) + '%';
            document.getElementById('rLeverage').textContent = leverage + 'x';
            document.getElementById('rNominal').textContent = formatNumber(nominalPosition, 2) + ' USDT';
            document.getElementById('rMargin').textContent = formatNumber(margin, 2) + ' USDT';
            document.getElementById('rQuantity').textContent = formatNumber(quantity, getQuantityPrecision(symbol)) + ' ' + symbol.toUpperCase();
            document.getElementById('rProfit').textContent = formatNumber(expectedProfit, 2) + ' USDT';
            document.getElementById('rRiskReward').textContent = formatNumber(riskReward, 1) + ' : 1';
            document.getElementById('rMarginRatio').textContent = formatNumber(marginRatio, 2) + '%';

            // 风险检查
            const warnings = document.getElementById('riskWarnings');
            let warningHtml = '';

            if (margin > balance) {
                warningHtml += '<div class="warning"><div class="warning-item">❌ 保证金超出账户余额，无法开仓。请减小仓位或降低杠杆。</div></div>';
            } else if (marginRatio > 30) {
                warningHtml += '<div class="warning"><div class="warning-item">⚠️ 保证金占比超30%，仓位偏重，注意集中度风险。</div></div>';
            }

            if (riskReward < 1) {
                warningHtml += '<div class="warning"><div class="warning-item">⚠️ 盈亏比不足1:1，收益不覆盖风险，建议调整止盈止损位。</div></div>';
            }

            if (stopDistance < feeRate * 2) {
                warningHtml += '<div class="warning"><div class="warning-item">❌ 止损距离小于手续费成本，不管涨跌都亏，请扩大止损。</div></div>';
            }

            if (leverage > 20) {
                warningHtml += '<div class="warning"><div class="warning-item">⚠️ 高杠杆交易，极端行情下可能被强平，确认你能承受。</div></div>';
            }

            if (warningHtml === '') {
                warningHtml = '<div class="success">✅ 所有风险检查通过</div>';
            }

            warnings.innerHTML = warningHtml;

            // 手续费优惠
            const feeDiscountDiv = document.getElementById('feeDiscount');
            if (exchange === 'Hyperliquid') {
                feeDiscountDiv.style.display = 'none';
            } else {
                feeDiscountDiv.style.display = 'block';
                const discount = discountRates[exchange];
                const discountFee = isSpot ? discount.spot : discount.futures;
                const currentFeeUSDT = nominalPosition * feeRate * 2;
                const discountFeeUSDT = nominalPosition * discountFee * 2;
                const saveUSDT = currentFeeUSDT - discountFeeUSDT;

                // 用优惠费率重新计算
                const discountRealStopCost = stopDistance + discountFee * 2;
                const discountNominalPosition = maxLoss / discountRealStopCost;
                const discountProfit = discountNominalPosition * tpDistance - discountNominalPosition * discountFee * 2;
                const discountRiskReward = discountProfit / maxLoss;
                const extraPosition = discountNominalPosition - nominalPosition;

                document.getElementById('fdCurrentFee').textContent = feeRate * 100 + '%（' + formatNumber(currentFeeUSDT, 2) + ' USDT）';
                document.getElementById('fdDiscountFee').textContent = discountFee * 100 + '%（' + formatNumber(discountFeeUSDT, 2) + ' USDT）';
                document.getElementById('fdSave').textContent = formatNumber(saveUSDT, 2) + ' USDT';
                document.getElementById('fdExtraPosition').textContent = formatNumber(extraPosition, 2) + ' USDT';
                document.getElementById('fdRiskReward').textContent = formatNumber(riskReward, 1) + ':1 → ' + formatNumber(discountRiskReward, 1) + ':1';
            }
        }
    </script>
</body>
</html>
